                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#2E4057", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::document", "label": "book-riscv-rev5-chap8", "shape": "dot", "title": "\u003cb\u003ebook-riscv-rev5-chap8\u003c/b\u003e\u003cbr\u003ekind: document\u003cbr\u003econtent_type: text"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::0::chapter_8", "label": "Chapter 8", "shape": "dot", "title": "\u003cb\u003eChapter 8\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: Chapter 8"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::1::scheduling", "label": "Scheduling", "shape": "dot", "title": "\u003cb\u003eScheduling\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: Scheduling"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::4::8_1_multiplexing", "label": "8.1 Multiplexing", "shape": "dot", "title": "\u003cb\u003e8.1 Multiplexing\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.1 Multiplexing"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::7::8_2_context_switch_overview", "label": "8.2 Context switch overview", "shape": "dot", "title": "\u003cb\u003e8.2 Context switch overview\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.2 Context switch overview"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::13::8_3_code_context_switching", "label": "8.3 Code: Context switching", "shape": "dot", "title": "\u003cb\u003e8.3 Code: Context switching\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.3 Code: Context switching"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::23::8_4 t to user processes. A common approach is to provide each process with the illusion that it has its own virtual CPU by multiplexing the processes onto the hardware CPUs. This chapter explains how xv6 achieves this multiplexing.\n\nBefore proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, an"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::3::before_proceeding_with_this_chapter_please_read_::chunk::1::before_proceeding_with_this_chapter_please_read_", "label": "Before proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule()...", "shape": "dot", "title": "\u003cb\u003eBefore proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule()...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.1 Multiplexing\u003cbr\u003etext: Before proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule() in kernel/proc.c.\n\nXv6 multiplexes by switching each CPU from one process to another in two situations. First, xv6 switches when a process makes a system call that blocks (has to wait), for example read or wait. Second, xv6 periodically forces a switch to cope with processes that compute for long periods without blocking. The former are called voluntary switches, the latter involu"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::6::implementing_multiplexing_poses_a_few_challenges::chunk::2::implementing_multiplexing_poses_a_few_challenges", "label": "Implementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is...", "shape": "dot", "title": "\u003cb\u003eImplementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: Implementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is to save and restore CPU registers, though the fact that this cannot be expressed in C makes it tricky. Second, how to force switches in a way that is transparent to user processes? Xv6 uses the standard technique in which a hardware timer\u2019s interrupts drive context switches. Third, all of the CPUs switch among the same set of processes, so a locking plan is necessary to avoid mis"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::image::9::images_e44c1bc110689c9f6cbead21d36537eb5309a7b22::chunk::3::images_e44c1bc110689c9f6cbead21d36537eb5309a7b22", "label": "![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: image\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: ![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::details::10::details_summary_flowchart_summary_mermaid_graph_::chunk::4::details_summary_flowchart_summary_mermaid_graph_", "label": "\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"...", "shape": "dot", "title": "\u003cb\u003e\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: details\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: \u003cdetails\u003e\n\u003csummary\u003eflowchart\u003c/summary\u003e\n\n```mermaid\ngraph TD\n    A[\"user space\"] --\u003e B[\"shell\"]\n    B --\u003e C[\"save kernel space\"]\n    C --\u003e D[\"kstack shell\"]\n    D --\u003e E[\"switch\"]\n    E --\u003e F[\"kstack scheduler\"]\n    F --\u003e G[\"switch\"]\n    G --\u003e H[\"kstack cat\"]\n    H --\u003e I[\"restore kernel space\"]\n    I --\u003e J[\"cat\"]\n```\n\u003c/details\u003e"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::11::figure_8_1_switching_from_one_user_process_to_an::chunk::5::figure_8_1_switching_from_one_user_process_to_an", "label": "Figure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one schedule...", "shape": "dot", "title": "\u003cb\u003eFigure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one schedule...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: Figure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one scheduler thread).\n\nAt a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a trap (system call or interrupt) from the old process\u2019s user space to its kernel thread, a context switch to the current CPU\u2019s scheduler thread, a context switch to a new process\u2019s kernel thread, and a trap return to the user-level process."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::12::at_a_broader_scope_the_steps_involved_in_switchi::chunk::6::at_a_broader_scope_the_steps_involved_in_switchi", "label": "At a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a...", "shape": "dot", "title": "\u003cb\u003eAt a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: At a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a trap (system call or interrupt) from the old process\u2019s user space to its kernel thread, a context switch to the current CPU\u2019s scheduler thread, a context switch to a new process\u2019s kernel thread, and a trap return to the user-level process.\n\nThe function swtch() in kernel/swtch.S contains the heart of thread context switching: it saves the switched-from thread\u2019s CPU registers, and"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::code::18::txt_sd_ra_0_a0_sd_sp_8_a0_sd_s0_16_a0::chunk::7::txt_sd_ra_0_a0_sd_sp_8_a0_sd_s0_16_a0", "label": "```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```", "shape": "dot", "title": "\u003cb\u003e```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: code\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```txt\nsd ra, 0 (a0)\nsd sp, 8 (a0)\nsd s0, 16 (a0)\n... \n```"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::code::19::asm_sd_s11_104_a0_ld_ra_0_a1_ld_sp_8_a1_ld_s0_16::chunk::8::asm_sd_s11_104_a0_ld_ra_0_a1_ld_sp_8_a1_ld_s0_16", "label": "```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```", "shape": "dot", "title": "\u003cb\u003e```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: code\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```asm\nsd s11, 104(a0)\nld ra, 0(a1)\nld sp, 8(a1)\nld s0, 16(a1)\n...\nld s11, 104(a1)\nret \n```"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::20::a0_holds_the_first_function_argument_and_a1_the_::chunk::9::a0_holds_the_first_function_argument_and_a1_the_", "label": "a0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers...", "shape": "dot", "title": "\u003cb\u003ea0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: a0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers to an offset 16 bytes into the memory pointed to by a0; referring to the definition of struct context in kernel/proc.h (1951), this is the structure field called s0.\n\nWhere does swtch\u2019s ret return to? It returns to the instruction that the ra register points to. In the example in which thread X calls swtch() to switch to Y, when ret executes, ra has just been loaded from Y\u2019s stru"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::22::swtch_2902_saves_callee_saved_registers_ra_sp_s0::chunk::10::swtch_2902_saves_callee_saved_registers_ra_sp_s0", "label": "swtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling conventi...", "shape": "dot", "title": "\u003cb\u003eswtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling conventi...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: swtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling convention requires that if code needs to preserve the value in a caller-saved register across a function call, the compiler must generate instructions that save the register to the stack before the function call, and restore from the stack when the function returns. So swtch can rely on the function that called it having already saved the caller-saved registers (either that, or the calli"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::image::26::images_beedb7345045080a4a25965466805e3357535b86e::chunk::11::images_beedb7345045080a4a25965466805e3357535b86e", "label": "![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: image\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: ![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::details::27::details_summary_text_image_summary_process_1_acq::chunk::12::details_summary_text_image_summary_process_1_acq", "label": "\u003cdetails\u003e \u003csummary\u003etext_image\u003c/summary\u003e Process 1 acquire(\u0026p-\u003elock); ... p-\u003estate = RUNNABLE; swtch(\u0026p-\u003econtext, ...)...", "shape": "dot", "title": "\u003cb\u003e\u003cdetails\u003e \u003csummary\u003etext_image\u003c/summary\u003e Process 1 acquire(\u0026p-\u003elock); ... p-\u003estate = RUNNABLE; swtch(\u0026p-\u003econtext, ...)...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: details\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: \u003cdetails\u003e\n\u003csummary\u003etext_image\u003c/summary\u003e\n\nProcess 1\nacquire(\u0026p-\u003elock);\n...\np-\u003estate = RUNNABLE;\nswtch(\u0026p-\u003econtext, ...);\n\n    swtch(...); // return\n    release(\u0026p-\u003elock);\n\n        // find a RUNNABLE p\n\n    acquire(\u0026p-\u003elock);\n    p-\u003estate = RUNNING;\n    swtch(...,\u0026p-\u003econtext);\n\n            swtch(\u0026p-\u003econtext,...); // return\n    release(\u0026p-\u003elock);\n\u003c/details\u003e"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::28::figure_8_2_swtch_always_has_the_scheduler_thread::chunk::13::figure_8_2_swtch_always_has_the_scheduler_thread", "label": "Figure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is alwa...", "shape": "dot", "title": "\u003cb\u003eFigure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is alwa...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: Figure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is always held.\n\nscheduler (2558) runs a loop: find a process to run, swtch() to it, eventually it will swtch() back to the scheduler, which continues its loop. The scheduler loops over the process table looking for a runnable process, one that has $\\mathrm { p { - } { \u003e } s t a t e ~ } = \\mathrm { - } \\mathrm { \\sf ~ R U N N A B L E }$ . Once it finds a process, it sets the per-CPU curr"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::32::there_is_one_case_when_the_scheduler_s_call_to_s::chunk::14::there_is_one_case_when_the_scheduler_s_call_to_s", "label": "There is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register...", "shape": "dot", "title": "\u003cb\u003eThere is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: There is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register of a new process to forkret (2653), so that its first swtch \u201creturns\u201d to the start of that function. forkret exists to release the p-\u003elock and set up some control registers and trapframe fields that are required in order to return to user space. At the end, forkret simulates the normal return path from a system call back to user space.\n\nXv6 often needs a pointer to the current pr"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::38::the_function_myproc_2187_returns_the_struct_proc::chunk::15::the_function_myproc_2187_returns_the_struct_proc", "label": "The function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc...", "shape": "dot", "title": "\u003cb\u003eThe function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: 8.6 Real world\u003cbr\u003etext: The function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc disables interrupts, invokes mycpu, fetches the current process pointer (c-\u003eproc) out of the struct cpu, and then enables interrupts. The return value of myproc is safe to use even if interrupts are enabled: if a timer interrupt moves the calling process to a different CPU, its struct proc pointer will stay the same.\n\nThe xv6 scheduler implements a simple scheduling policy that r"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::paragraph::40::the_xv6_scheduler_implements_a_simple_scheduling::chunk::16::the_xv6_scheduler_implements_a_simple_scheduling", "label": "The xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round r...", "shape": "dot", "title": "\u003cb\u003eThe xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round r...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: mixed\u003cbr\u003esection: 8.7 Exercises\u003cbr\u003etext: The xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round robin. Real operating systems implement more sophisticated policies that, for example, allow processes to have priorities. The idea is that a runnable high-priority process will be preferred by the scheduler over a runnable low-priority process. These policies can become complex because there are often competing goals: for example, the operating system might also want to guarantee "}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::artifact::9::images_e44c1bc110689c9f6cbead21d36537eb5309a7b22", "label": "![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)\u003c/b\u003e\u003cbr\u003ekind: artifact\u003cbr\u003econtent_type: image\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: ![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)"}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::artifact::10::details_summary_flowchart_summary_mermaid_graph_", "label": "\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"...", "shape": "dot", "title": "\u003cb\u003e\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"...\u003c/b\u003e\u003cbr\u003ekind: artifact\u003cbr\u003econtent_type: details\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: \u003cdetails\u003e\n\u003csummary\u003eflowchart\u003c/summary\u003e\n\n```mermaid\ngraph TD\n    A[\"user space\"] --\u003e B[\"shell\"]\n    B --\u003e C[\"save kernel space\"]\n    C --\u003e D[\"kstack shell\"]\n    D --\u003e E[\"switch\"]\n    E --\u003e F[\"kstack scheduler\"]\n    F --\u003e G[\"switch\"]\n    G --\u003e H[\"kstack cat\"]\n    H --\u003e I[\"restore kernel space\"]\n    I --\u003e J[\"cat\"]\n```\n\u003c/details\u003e"}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::artifact::18::txt_sd_ra_0_a0_sd_sp_8_a0_sd_s0_16_a0", "label": "```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```", "shape": "dot", "title": "\u003cb\u003e```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```\u003c/b\u003e\u003cbr\u003ekind: artifact\u003cbr\u003econtent_type: code\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```txt\nsd ra, 0 (a0)\nsd sp, 8 (a0)\nsd s0, 16 (a0)\n... \n```"}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::artifact::19::asm_sd_s11_104_a0_ld_ra_0_a1_ld_sp_8_a1_ld_s0_16", "label": "```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```", "shape": "dot", "title": "\u003cb\u003e```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```\u003c/b\u003e\u003cbr\u003ekind: artifact\u003cbr\u003econtent_type: code\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```asm\nsd s11, 104(a0)\nld ra, 0(a1)\nld sp, 8(a1)\nld s0, 16(a1)\n...\nld s11, 104(a1)\nret \n```"}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::artifact::26::images_beedb7345045080a4a25965466805e3357535b86e", "label": "![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)\u003c/b\u003e\u003cbr\u003ekind: artifa
