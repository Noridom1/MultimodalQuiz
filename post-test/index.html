<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz – eco.json</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #question-card { transition: opacity 0.25s ease; }
    #question-card.fade-out { opacity: 0; }
    .opt-btn.selected { @apply ring-2 ring-indigo-500 bg-indigo-50; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-indigo-50 flex flex-col items-center py-10 px-4">

  <div class="w-full max-w-3xl mb-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center text-sm text-slate-500 mb-4 gap-3">
      <span id="progress-label" class="font-medium">Question 1 of 10</span>
      
      <div class="flex flex-wrap gap-4">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input id="show-validation" type="checkbox" class="accent-indigo-600 w-4 h-4" />
          <span>Show correct/wrong marks</span>
        </label>

        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input id="show-explanation" type="checkbox" class="accent-indigo-600 w-4 h-4" />
          <span>Show explanation</span>
        </label>
      </div>
    </div>
    
    <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
      <div id="progress-bar" class="h-full bg-indigo-500 rounded-full transition-all duration-500"
           style="width:10.0%"></div>
    </div>
  </div>

  <div id="question-card" class="w-full max-w-3xl bg-white rounded-3xl shadow-xl overflow-hidden">
    <div id="img-panel" class="hidden bg-slate-100 flex justify-center items-center p-4 border-b border-slate-200">
      <img id="q-image" src="" alt="Question image" class="max-h-72 w-auto object-contain rounded-xl shadow" />
    </div>

    <div class="p-8">
      <div class="flex flex-wrap gap-2 mb-4" id="meta-chips"></div>
      <h2 id="q-text" class="text-xl font-semibold text-slate-800 mb-6 leading-snug"></h2>
      <div id="options-list" class="flex flex-col gap-3"></div>
      <div id="feedback-box" class="hidden mt-6 p-4 rounded-2xl border text-sm leading-relaxed"></div>

      <div class="mt-8 flex gap-3">
        <button id="submit-btn" class="px-6 py-2.5 rounded-xl bg-indigo-600 text-white font-medium hover:bg-indigo-700 active:scale-95 transition disabled:opacity-40" disabled>
          Submit
        </button>
        <button id="next-btn" class="hidden px-6 py-2.5 rounded-xl bg-slate-700 text-white font-medium hover:bg-slate-800 active:scale-95 transition">
          Next →
        </button>
      </div>
    </div>
  </div>

  <div id="results-screen" class="hidden w-full max-w-3xl mt-8">
    <div class="bg-white rounded-3xl shadow-xl p-8 text-center">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="text-2xl font-bold text-slate-800 mb-2">Quiz Complete</h2>
      <p id="score-text" class="text-slate-500 mb-8 text-lg"></p>
      <div class="overflow-x-auto mb-8">
        <table class="w-full text-sm text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-200 text-slate-500 text-xs uppercase tracking-wide">
              <th class="py-2 pr-4">#</th>
              <th class="py-2 pr-4">Question</th>
              <th class="py-2 pr-4">Selected</th>
              <th class="py-2 pr-4">Result</th>
              <th class="py-2">Time (s)</th>
            </tr>
          </thead>
          <tbody id="results-table"></tbody>
        </table>
      </div>
      <div id="username-panel" class="hidden mb-4 text-left">
        <label for="username-input" class="block text-sm font-medium text-slate-700 mb-2">Your name</label>
        <input id="username-input" type="text" autocomplete="name" placeholder="Enter your name" class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-800 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>
      <button id="download-btn" class="px-8 py-3 rounded-xl bg-emerald-600 text-white font-semibold hover:bg-emerald-700 active:scale-95 transition text-base">
        ⬇ Download Results (JSON)
      </button>
    </div>
  </div>

  <script>
  const QUESTIONS = [{"index": 1, "id": "q_1", "question_text": "How do economists define 'demand' for a good or service?", "options": ["A) Only the specific need or want a consumer has for a product", "B) The amount of a good or service consumers are willing and able to purchase at each price", "C) The total quantity of products currently available in the market", "D) The maximum price a producer can charge for a service"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "Economists use the term demand to refer to the amount of some good or service consumers are willing and able to purchase at each price.", "question_type": "multiple_choice", "target_concept": "definition of demand", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 2, "id": "q_2", "question_text": "What does the 'law of demand' describe regarding the relationship between price and quantity demanded?", "options": ["A) A positive relationship where higher prices lead to higher quantity demanded", "B) A constant relationship where price has no effect on consumer behavior", "C) An inverse relationship where a rise in price almost always decreases the quantity demanded", "D) A situation where consumers only buy goods when they are at their most expensive"], "correct_answer_raw": "C", "correct_index": 2, "explanation": "Economists call the inverse relationship between price and quantity demanded the law of demand, where a rise in price decreases quantity demanded and a fall in price increases it.", "question_type": "multiple_choice", "target_concept": "law of demand", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 3, "id": "q_3", "question_text": "What is the difference between 'demand' and 'quantity demanded' in economic terminology?", "options": ["A) They are identical terms used interchangeably by economists", "B) Demand refers to the curve (the relationship across a range of prices), while quantity demanded refers to a specific point on that curve", "C) Quantity demanded refers to the whole curve, while demand refers to a specific point", "D) Demand is determined by producers, while quantity demanded is determined by the government"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "Demand refers to the relationship between a range of prices and the quantities demanded at those prices, as shown by a curve, while quantity demanded refers to only a certain point on that curve.", "question_type": "multiple_choice", "target_concept": "demand vs. quantity demanded", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 4, "id": "q_4", "question_text": "According to the 'law of supply,' how do producers typically react to a rise in the price of a good?", "options": ["A) They decrease the quantity supplied to keep the product rare", "B) They increase the quantity supplied to take advantage of higher profits", "C) They stop production until the price stabilizes", "D) They keep the quantity supplied exactly the same"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "The law of supply states that a rise in price almost always leads to an increase in the quantity supplied of that good or service.", "question_type": "multiple_choice", "target_concept": "law of supply", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 5, "id": "q_5", "question_text": "", "options": ["A) It slopes downward from left to right", "B) It is a perfectly horizontal line", "C) It slopes upward from left to right", "D) It is a perfectly vertical line"], "correct_answer_raw": "C", "correct_index": 2, "explanation": "Nearly all supply curves slope up from left to right, illustrating the law of supply that a higher price leads to a higher quantity supplied.", "question_type": "multiple_choice", "target_concept": "supply curve slope", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 6, "id": "q_6", "question_text": "What is the economic term for a table that shows the quantity supplied at a range of different prices?", "options": ["A) Demand schedule", "B) Supply curve", "C) Equilibrium chart", "D) Supply schedule"], "correct_answer_raw": "D", "correct_index": 3, "explanation": "A supply schedule is a table that shows the quantity supplied at a range of different prices.", "question_type": "multiple_choice", "target_concept": "supply schedule", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 7, "id": "q_7", "question_text": "In a market graph, what occurs at the point where the supply curve and the demand curve intersect?", "options": ["A) A market shortage is created", "B) Equilibrium is reached, where quantity demanded equals quantity supplied", "C) A market surplus is created", "D) The price is set at its absolute maximum"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "The point where the supply curve (S) and the demand curve (D) cross is called the equilibrium, which is the only price where quantity demanded is equal to quantity supplied.", "question_type": "multiple_choice", "target_concept": "market equilibrium", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 8, "id": "q_8", "question_text": "If the market price for gasoline is set at $1.80 per gallon when the equilibrium price is $1.40, what will happen in the market?", "options": ["A) There will be a shortage because consumers will buy more", "B) There will be a surplus (excess supply) because quantity supplied exceeds quantity demanded", "C) The market will remain in balance indefinitely", "D) Producers will immediately stop drilling for more oil"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "At any above-equilibrium price, the quantity supplied exceeds the quantity demanded, which is called an excess supply or a surplus.", "question_type": "multiple_choice", "target_concept": "surplus", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 9, "id": "q_9", "question_text": "When a market experiences 'excess demand' or a 'shortage,' what typically happens to the price?", "options": ["A) The price falls to help producers sell their excess stock", "B) The price rises toward the equilibrium level", "C) The price remains frozen by law", "D) The price fluctuates randomly without direction"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "When there is excess demand or a shortage, eager buyers and profit-seeking firms create pressure for the price to rise toward the equilibrium level.", "question_type": "multiple_choice", "target_concept": "shortage and price adjustment", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}, {"index": 10, "id": "q_10", "question_text": "Why would an individual who wants a car but cannot afford to pay for it have 'no effective demand' according to economists?", "options": ["A) Because economists do not care about human needs", "B) Because demand is based on both the want and the ability to pay", "C) Because the individual hasn't looked at enough car models yet", "D) Because there are too many cars currently in the market"], "correct_answer_raw": "B", "correct_index": 1, "explanation": "Demand is based on the ability to pay; if a consumer cannot pay for a good, they have no effective demand for it.", "question_type": "multiple_choice", "target_concept": "effective demand", "difficulty": "", "image_grounded": false, "reasoning_type": "", "image_uri": ""}];
  const SHOW_SCORE = false;
  const UPLOAD_URL = "https://script.google.com/macros/s/AKfycbzfO0Ndr9C1t5YDpda7_wSOkVKprgZvMtZUoEACSOcBiWskbIqwQHFrSUuvMt_G0Pw/exec";
  let current = 0, selected = null, submitted = false, qStartMs = Date.now();
  const results = [];

  const progressBar = document.getElementById('progress-bar'),
        progressLabel = document.getElementById('progress-label'),
        imgPanel = document.getElementById('img-panel'),
        qImage = document.getElementById('q-image'),
        metaChips = document.getElementById('meta-chips'),
        qText = document.getElementById('q-text'),
        optionsList = document.getElementById('options-list'),
        feedbackBox = document.getElementById('feedback-box'),
        submitBtn = document.getElementById('submit-btn'),
        nextBtn = document.getElementById('next-btn'),
        questionCard = document.getElementById('question-card'),
        resultsScreen = document.getElementById('results-screen'),
        showExpCb = document.getElementById('show-explanation'),
        showValCb = document.getElementById('show-validation'),
        usernamePanel = document.getElementById('username-panel'),
        usernameInput = document.getElementById('username-input'),
        downloadBtn = document.getElementById('download-btn');

  function renderQuestion(idx) {
    const q = QUESTIONS[idx];
    selected = null; submitted = false; qStartMs = Date.now();
    progressBar.style.width = Math.round((idx / QUESTIONS.length) * 100) + '%';
    progressLabel.textContent = `Question ${idx + 1} of ${QUESTIONS.length}`;

    if (q.image_uri) { qImage.src = q.image_uri; imgPanel.classList.replace('hidden', 'flex'); } 
    else { imgPanel.classList.replace('flex', 'hidden'); }

    metaChips.innerHTML = '';
    [['#' + (idx + 1), 'bg-slate-100 text-slate-500'], [q.difficulty, difficultyColor(q.difficulty)], [q.question_type, 'bg-violet-50 text-violet-600']].forEach(([l, c]) => {
      if (!l) return;
      const span = document.createElement('span');
      span.className = `text-xs font-medium px-3 py-1 rounded-full ${c}`;
      span.textContent = l;
      metaChips.appendChild(span);
    });

    qText.textContent = q.question_text;
    optionsList.innerHTML = '';
    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = "opt-btn w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-white hover:bg-indigo-50 transition text-slate-700 font-medium";
      btn.textContent = opt;
      btn.onclick = () => selectOption(i);
      optionsList.appendChild(btn);
    });

    feedbackBox.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.classList.remove('hidden');
    nextBtn.classList.add('hidden');
  }

  function difficultyColor(d) {
    return { easy: 'bg-green-50 text-green-700', medium: 'bg-yellow-50 text-yellow-700', hard: 'bg-red-50 text-red-700' }[d] || 'bg-slate-100 text-slate-500';
  }

  function selectOption(idx) {
    if (submitted) return;
    selected = idx;
    Array.from(optionsList.children).forEach((btn, i) => {
      btn.style.outline = (i === idx) ? '2px solid #6366f1' : '';
      btn.style.background = (i === idx) ? '#eef2ff' : '';
    });
    submitBtn.disabled = false;
  }

  submitBtn.onclick = () => {
    if (selected === null || submitted) return;
    submitted = true;
    const q = QUESTIONS[current], correct = selected === q.correct_index;

    results.push({
      question_id: q.id, is_correct: correct, selected_index: selected, 
      time_spent_s: parseFloat(((Date.now() - qStartMs) / 1000).toFixed(2))
    });

    // Only highlight if the "Show validation" toggle is checked
    if (showValCb.checked) {
      Array.from(optionsList.children).forEach((btn, i) => {
        btn.style.outline = '';
        if (i === q.correct_index) { btn.style.background = '#d1fae5'; btn.style.borderColor = '#34d399'; }
        else if (i === selected && !correct) { btn.style.background = '#fee2e2'; btn.style.borderColor = '#f87171'; }
      });
    }

    if (showExpCb.checked) {
      feedbackBox.classList.remove('hidden');
      feedbackBox.className = `mt-6 p-4 rounded-2xl border text-sm ${correct ? 'bg-green-50 border-green-300 text-green-800' : 'bg-red-50 border-red-300 text-red-800'}`;
      feedbackBox.innerHTML = `<strong>${correct ? '✅ Correct!' : '❌ Incorrect.'}</strong><br>${escHtml(q.explanation)}`;
    }

    submitBtn.classList.add('hidden');
    nextBtn.classList.remove('hidden');
  };

  nextBtn.onclick = () => {
    questionCard.classList.add('fade-out');
    setTimeout(() => {
      current++;
      if (current < QUESTIONS.length) renderQuestion(current);
      else showResults();
      questionCard.classList.remove('fade-out');
    }, 220);
  };

  function showResults() {
    questionCard.classList.add('hidden');
    resultsScreen.classList.remove('hidden');
    const score = results.filter(r => r.is_correct).length;
    document.getElementById('score-text').textContent = SHOW_SCORE ? `Score: ${score} / ${results.length}` : '';
    if (UPLOAD_URL) {
      usernamePanel.classList.remove('hidden');
      usernameInput.focus();
    }
  }

  function downloadResults() {
    const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'quiz_results.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function uploadResults() {
    if (!UPLOAD_URL) return Promise.reject(new Error('No upload URL configured'));
    const username = usernameInput.value.trim() || 'Anonymous';
    // Use no-cors mode for Google Apps Script endpoints that expect simple POSTs
    return fetch(UPLOAD_URL, {
      method: 'POST',
      mode: 'no-cors',
      cache: 'no-cache',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        username: username,
        results: results,
      })
    });
  }

  // Wire the download/upload button depending on configuration
  if (UPLOAD_URL) {
    downloadBtn.textContent = '⬆ Upload Results (Google Sheets)';
    downloadBtn.onclick = () => {
      if (!usernameInput.value.trim()) {
        usernameInput.focus();
        usernameInput.placeholder = 'Please enter your name first';
        return;
      }
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Uploading...';
      uploadResults()
        .then(() => { downloadBtn.textContent = 'Uploaded ✓'; })
        .catch(err => { console.error('Upload error:', err); downloadBtn.textContent = 'Upload Failed'; })
        .finally(() => { setTimeout(() => { downloadBtn.disabled = false; downloadBtn.textContent = '⬆ Upload Results (Google Sheets)'; }, 2000); });
    };
  } else {
    downloadBtn.onclick = downloadResults;
  }

  function escHtml(str) { return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

  QUESTIONS.length ? renderQuestion(0) : qText.textContent = 'No questions found.';
  </script>
</body>
</html>
