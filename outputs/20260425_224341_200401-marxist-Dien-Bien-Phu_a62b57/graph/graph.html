                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#2E4057", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::document", "label": "200401-marxist-Dien-Bien-Phu", "shape": "dot", "title": "\u003cb\u003e200401-marxist-Dien-Bien-Phu\u003c/b\u003e\u003cbr\u003ekind: document\u003cbr\u003econtent_type: text"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::section::0::on_the_50th_anniversary_of_the_battle_of_dien_bi", "label": "On the 50th anniversary of the battle of Dien Bien Phu:", "shape": "dot", "title": "\u003cb\u003eOn the 50th anniversary of the battle of Dien Bien Phu:\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: On the 50th anniversary of the battle of Dien Bien Phu:"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::section::1::the_historic_dien_bien_phu_campaign", "label": "The Historic Dien Bien Phu Campaign", "shape": "dot", "title": "\u003cb\u003eThe Historic Dien Bien Phu Campaign\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::section::18::first_phase_destruction_of_the_northern_sub_sect", "label": "First phase: destruction of the northern sub-sector", "shape": "dot", "title": "\u003cb\u003eFirst phase: destruction of the northern sub-sector\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: First phase: destruction of the northern sub-sector"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::section::26::second_phase_occupation_of_the_hills_in_the_east", "label": "Second phase: Occupation of the hills in the east and encirclement of the central sub-sector", "shape": "dot", "title": "\u003cb\u003eSecond phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::section::35::third_phase_annihilation_of_the_enemy", "label": "Third phase: Annihilation of the enemy", "shape": "dot", "title": "\u003cb\u003eThird phase: Annihilation of the enemy\u003c/b\u003e\u003cbr\u003ekind: section\u003cbr\u003econtent_type: text\u003cbr\u003esection: Third phase: Annihilation of the enemy"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::2::vo_nguyen_giap::chunk::0::vo_nguyen_giap", "label": "Vo Nguyen Giap Dien Bien Phu is a large plain 18 kilometers long and six to eight kilometers wide in the mountainous...", "shape": "dot", "title": "\u003cb\u003eVo Nguyen Giap Dien Bien Phu is a large plain 18 kilometers long and six to eight kilometers wide in the mountainous...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: Vo Nguyen Giap\n\nDien Bien Phu is a large plain 18 kilometers long and six to eight kilometers wide in the mountainous zone of the North-West. It is the biggest and richest of the four plains in this hilly region close to the Vietnam-Laos frontier. It is situated at the junction of important roads, running to the north-east towards Lai Chau, to the east and south-east towards Tuan Giao, Son La, Na San, to the west towards Luang Prabang and to the south towards Sam Neua. In the theatre of operatio"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::5::those_forces_were_distributed_into_three_sub_sec::chunk::1::those_forces_were_distributed_into_three_sub_sec", "label": "Those forces were distributed into three sub-sectors which had to support one another and comprised 49 strong-points....", "shape": "dot", "title": "\u003cb\u003eThose forces were distributed into three sub-sectors which had to support one another and comprised 49 strong-points....\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: Those forces were distributed into three sub-sectors which had to support one another and comprised 49 strong-points. Each was a defence centre, while several were grouped into \"complex defence centres\" equipped with mobile forces and artillery, and surrounded by trenches and barbed wire hundreds of metres thick. Each subsector comprised many strong-fortified defence centres.\n\nThe most important was the central sub-sector situated in Muong Thanh village, the centre of the Dien Bien Phu district."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::7::the_northern_sub_sector_comprised_the_defence_ce::chunk::2::the_northern_sub_sector_comprised_the_defence_ce", "label": "The northern sub-sector comprised the defence centres of Him Lam, Doc Lap and Ban Keo. The very strong positions of H...", "shape": "dot", "title": "\u003cb\u003eThe northern sub-sector comprised the defence centres of Him Lam, Doc Lap and Ban Keo. The very strong positions of H...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: The northern sub-sector comprised the defence centres of Him Lam, Doc Lap and Ban Keo. The very strong positions of Him Lam and Doc Lap were to check all attacks of our troops coming from Tuan Giao and Lai Chau.\n\nAs for the southern sub-sector, also known as Hong Cum sub-sector, it was to break any offensive coming from the south and to protect the communications with Upper Laos.\n\nThe enemy artillery was divided into two bases: one at Muong Thanh, the other at Hong Cum, arranged in such a way as"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::12::general_navarre_asserted_that_with_such_powerful::chunk::3::general_navarre_asserted_that_with_such_powerful", "label": "General Navarre asserted that with such powerful forces and so strong a defence system, Dien Bien Phu was \"an impregn...", "shape": "dot", "title": "\u003cb\u003eGeneral Navarre asserted that with such powerful forces and so strong a defence system, Dien Bien Phu was \"an impregn...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: General Navarre asserted that with such powerful forces and so strong a defence system, Dien Bien Phu was \"an impregnable fortress\u2026.\". The American general O\u0027Daniel who paid a visit to the base shared this opinion. From this subjective point of view, the enemy came to the conclusion that our troops had little chance of success in an attack on Dien Bien Phu. They even considered that such an attack would be a good opportunity for them to inflict a severe defeat on us.\n\nOn our side, after the libe"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::13::on_our_side_after_the_liberation_of_lai_chau_an_::chunk::4::on_our_side_after_the_liberation_of_lai_chau_an_", "label": "On our side, after the liberation of Lai Chau, an attack upon Dien Bien Phu was on the agenda. We considered that the...", "shape": "dot", "title": "\u003cb\u003eOn our side, after the liberation of Lai Chau, an attack upon Dien Bien Phu was on the agenda. We considered that the...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: On our side, after the liberation of Lai Chau, an attack upon Dien Bien Phu was on the agenda. We considered that the base, well entrenched as it was, had vulnerable points. In attacking it, we would face enormous difficulties in strategy, tactics and supply, but these difficulties could be overcome. After having analysed the situation and weighed the pros and cons, we decided to attack Dien Bien Phu according to the watchword: relentless attack, steady advance. Our tactics would be to attack th"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::14::three_months_had_passed_from_the_occupation_of_d::chunk::5::three_months_had_passed_from_the_occupation_of_d", "label": "Three months had passed from the occupation of Dien Bien Phu by enemy paratroops to the launching of our campaign. Du...", "shape": "dot", "title": "\u003cb\u003eThree months had passed from the occupation of Dien Bien Phu by enemy paratroops to the launching of our campaign. Du...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: Three months had passed from the occupation of Dien Bien Phu by enemy paratroops to the launching of our campaign. During that time, the enemy did their utmost to consolidate their defence system, bring in reinforcements, dig new trenches, and strengthen their entrenchments. On our side, the army and people actively prepared the offensive. Carrying out the orders of the Party\u0027s Central Committee and the Government, they mustered all their strength to guarantee the success of the Winter-Spring ca"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::15::in_the_first_week_of_march_the_preparations_were::chunk::6::in_the_first_week_of_march_the_preparations_were", "label": "In the first week of March, the preparations were completed; the artillery had solid casemates, the operational bases...", "shape": "dot", "title": "\u003cb\u003eIn the first week of March, the preparations were completed; the artillery had solid casemates, the operational bases...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003etext: In the first week of March, the preparations were completed; the artillery had solid casemates, the operational bases were established, food and ammunitiftp://cpimorg@cpim.org/public\\_htmlon were available in sufficient quantity. After having studied the aim and significance of the campaign, all officers and soldiers were filled with a very high determination to annihilate the enemy, as they were persuaded that only the destruction of the Dien Bien Phu entrenched camp would bring the \"Navarre pl"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::17::the_campaign_proceeded_in_three_phases_in_the_fi::chunk::7::the_campaign_proceeded_in_three_phases_in_the_fi", "label": "The campaign proceeded in three phases: in the first phase we destroyed the northern sub-sector; in the second, the l...", "shape": "dot", "title": "\u003cb\u003eThe campaign proceeded in three phases: in the first phase we destroyed the northern sub-sector; in the second, the l...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: First phase: destruction of the northern sub-sector\u003cbr\u003etext: The campaign proceeded in three phases: in the first phase we destroyed the northern sub-sector; in the second, the longest and bitterest one, we took the heights in the east of the central subsector and tightened our encirclement; in the third, we launched the general offensive and annihilated the enemy.\n\nThis phase began on March 13th and ended on March 17th. On the night of March 13th, we annihilated the very strong defence centre of Him Lam which overlooked the road from Tuan Giao to Dien Bi"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::21::on_the_night_of_the_14th_we_concentrated_our_for::chunk::8::on_the_night_of_the_14th_we_concentrated_our_for", "label": "On the night of the 14th, we concentrated our forces to attack the defence centre of Doc Lap, the second strong point...", "shape": "dot", "title": "\u003cb\u003eOn the night of the 14th, we concentrated our forces to attack the defence centre of Doc Lap, the second strong point...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: First phase: destruction of the northern sub-sector\u003cbr\u003etext: On the night of the 14th, we concentrated our forces to attack the defence centre of Doc Lap, the second strong point of the northern sub-sector which overlooked the road from Lai Chau to Dien Bien Phu. The battle went on till dawn. The enemy used every means to repel our forces, fired scores of thousands of shells and sent their mobile forces protected by tanks from Muong Thanh to support their position. Our troops fought heroically, took the strong-point and repelled the enemy reinforcements.\n"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::24::the_great_and_resounding_victory_which_ended_the::chunk::9::the_great_and_resounding_victory_which_ended_the", "label": "The great and resounding victory which ended the first phase of operations stirred our army and people and gave each...", "shape": "dot", "title": "\u003cb\u003eThe great and resounding victory which ended the first phase of operations stirred our army and people and gave each...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: First phase: destruction of the northern sub-sector\u003cbr\u003etext: The great and resounding victory which ended the first phase of operations stirred our army and people and gave each and every one faith in final victory.\n\nAs for the enemy, despite their heavy losses, they still had confidence in the power of resistance of the central sub-sector, in the strength of their artillery and air force. They even expected that we would suffer heavy losses and would be obliged to give up the offensive; and especially, that if the campaign was protracted our supply lines"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::25::as_for_the_enemy_despite_their_heavy_losses_they::chunk::10::as_for_the_enemy_despite_their_heavy_losses_they", "label": "As for the enemy, despite their heavy losses, they still had confidence in the power of resistance of the central sub...", "shape": "dot", "title": "\u003cb\u003eAs for the enemy, despite their heavy losses, they still had confidence in the power of resistance of the central sub...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: As for the enemy, despite their heavy losses, they still had confidence in the power of resistance of the central sub-sector, in the strength of their artillery and air force. They even expected that we would suffer heavy losses and would be obliged to give up the offensive; and especially, that if the campaign was protracted our supply lines would be cut and that the great logistic difficulties thus created would force us to withdraw.\n\nThe second phase was the most important of the campaign. We"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::28::during_the_night_of_march_30th_the_second_phase_::chunk::11::during_the_night_of_march_30th_the_second_phase_", "label": "During the night of March 30th, the second phase began. We launched a large scale attack to capture the heights in th...", "shape": "dot", "title": "\u003cb\u003eDuring the night of March 30th, the second phase began. We launched a large scale attack to capture the heights in th...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: During the night of March 30th, the second phase began. We launched a large scale attack to capture the heights in the east and a certain number of strong-points in the west in order to tighten our encirclement, and to hamper and cut off supplies to the garrison.\n\nOn the night of March 30th, we concentrated important forces to attack simultaneously the five fortified heights in the east. On that same night, we succeeded in capturing hills E-1, D-1 and C-1, but could not take hill A-1, the most i"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::29::on_the_night_of_march_30th_we_concentrated_impor::chunk::12::on_the_night_of_march_30th_we_concentrated_impor", "label": "On the night of March 30th, we concentrated important forces to attack simultaneously the five fortified heights in t...", "shape": "dot", "title": "\u003cb\u003eOn the night of March 30th, we concentrated important forces to attack simultaneously the five fortified heights in t...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: On the night of March 30th, we concentrated important forces to attack simultaneously the five fortified heights in the east. On that same night, we succeeded in capturing hills E-1, D-1 and C-1, but could not take hill A-1, the most important of all. The defence line constituted by these heights was the key to the defensive system of the central sub-sector: its loss would lead to the fall of Dien Bien Phu. Consequently, the fight here was the fiercest. Particularly on hill A-1, the last height "}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::30::while_the_situation_in_the_east_was_static_in_th::chunk::13::while_the_situation_in_the_east_was_static_in_th", "label": "While the situation in the east was static, in the north and in the west our encirclement grew tighter and tighter. T...", "shape": "dot", "title": "\u003cb\u003eWhile the situation in the east was static, in the north and in the west our encirclement grew tighter and tighter. T...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: While the situation in the east was static, in the north and in the west our encirclement grew tighter and tighter. The lines of both sides drew nearer and nearer to each other, in some points they were only 10 to 15 metres apart. From our newly-occupied positions to our frontlines northward and westward, the fire of our artillery and mortars pounded the enemy without let-up. Day and night the fighting went on. We exhausted the enemy by harassing them, firing constantly at their lines, and at th"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::31::in_mid_april_after_the_destruction_of_several_en::chunk::14::in_mid_april_after_the_destruction_of_several_en", "label": "In mid-April, after the destruction of several enemy positions in the north and the west, our lines reached the airfi...", "shape": "dot", "title": "\u003cb\u003eIn mid-April, after the destruction of several enemy positions in the north and the west, our lines reached the airfi...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: In mid-April, after the destruction of several enemy positions in the north and the west, our lines reached the airfield, then cut it from west to east. As our encirclement grew still tighter, the fighting became fiercer. The enemy launched several violent counterattacks supported by tanks and aircraft aimed at taking ground from us and forcing us to loosen our encirclement. On April 24th, the most violent counter-attack was launched with the aim of driving us from the airfield: after inflicting"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::32::the_territory_occupied_by_the_enemy_shrank_in_si::chunk::15::the_territory_occupied_by_the_enemy_shrank_in_si", "label": "The territory occupied by the enemy shrank in size day by day to become only two kilometers square and was under cont...", "shape": "dot", "title": "\u003cb\u003eThe territory occupied by the enemy shrank in size day by day to become only two kilometers square and was under cont...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: The territory occupied by the enemy shrank in size day by day to become only two kilometers square and was under continuous heavy fire. The enemy\u0027s supply problem became more and more critical. The airfield having been out of action for a long time, all supplied were dropped by parachute. But as the enemy zone was too narrow, and their pilots feared our anti-aircraft fire and dared not fly low, only a part of the parachutes carrying food and ammunition fell into the enemy positions, while the bu"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::33::throughout_the_second_phase_the_situation_was_ex::chunk::16::throughout_the_second_phase_the_situation_was_ex", "label": "Throughout the second phase, the situation was extremely tense. The American interventionists sent more bombers and t...", "shape": "dot", "title": "\u003cb\u003eThroughout the second phase, the situation was extremely tense. The American interventionists sent more bombers and t...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Second phase: Occupation of the hills in the east and encirclement of the central sub-sector\u003cbr\u003etext: Throughout the second phase, the situation was extremely tense. The American interventionists sent more bombers and transport planes to support the Dien Bien Phu base. The enemy bombers were very active; they ceaselessly bombed our positions, dropped napalm bombs to burn down the vegetation on the heights surrounding Dien Bien Phu, and bombed points that they thought were our artillery bases. Day and night they shelled our supply lines, dropped block-busters on the roads, showered them with dela"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::34::the_french_and_american_generals_then_realised_t::chunk::17::the_french_and_american_generals_then_realised_t", "label": "The French and American generals then realised the danger of the destruction of the Dien Bien Phu entrenched camp. At...", "shape": "dot", "title": "\u003cb\u003eThe French and American generals then realised the danger of the destruction of the Dien Bien Phu entrenched camp. At...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Third phase: Annihilation of the enemy\u003cbr\u003etext: The French and American generals then realised the danger of the destruction of the Dien Bien Phu entrenched camp. At one moment, the High Command of the French Expeditionary Corps thought of gathering its remaining forces for an attack on our rear and in the direction of Viet Bac, to cut our supply lines and force us to withdraw for lack of food and ammunition. But it could not carry out this plan. Moreover, it feared that a still more severe defeat could be the result of so foolhardy an action"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::36::on_may_1st_began_the_third_phase_from_may_1st_to::chunk::18::on_may_1st_began_the_third_phase_from_may_1st_to", "label": "On May 1st, began the third phase. From May 1st to May 6th, following several successive attacks, we occupied hill C-...", "shape": "dot", "title": "\u003cb\u003eOn May 1st, began the third phase. From May 1st to May 6th, following several successive attacks, we occupied hill C-...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Third phase: Annihilation of the enemy\u003cbr\u003etext: On May 1st, began the third phase. From May 1st to May 6th, following several successive attacks, we occupied hill C-1, hill A-1 which was the key of the last defensive system of the central sub-sector, and several other strong-points from the foot of the hills in the east to the Nam Rom river, and finally some positions in the west. The enemy were driven into a square kilometer, entirely exposed to our fire. There was no fortified height to protect them. The problem of supply became extremely g"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::40::during_that_time_our_troops_were_very_active_in_::chunk::19::during_that_time_our_troops_were_very_active_in_", "label": "During that time, our troops were very active in all theatres of operations in coordination with the main front. In t...", "shape": "dot", "title": "\u003cb\u003eDuring that time, our troops were very active in all theatres of operations in coordination with the main front. In t...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Third phase: Annihilation of the enemy\u003cbr\u003etext: During that time, our troops were very active in all theatres of operations in coordination with the main front.\n\nIn the enemy\u0027s rear in the Red River delta, they destroyed, one after another, a large number of positions and seriously threatened Road No. 5.\n\nIn the Fifth Zone, they attacked Road No. 19, annihilated the mobile regiment No. 100, liberated An Khe, penetrated deep into the region of Cheo Reo, and threatened Pleiku and Banmethuot.\n\nOur troops were also very active in Binh-Tri-Thien a"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::paragraph::48::at_dien_bien_phu_we_put_out_of_action_16_200_ene::chunk::20::at_dien_bien_phu_we_put_out_of_action_16_200_ene", "label": "At Dien Bien Phu, we put out of action 16,200 enemy troops, including the whole command of the entrenched camp, one g...", "shape": "dot", "title": "\u003cb\u003eAt Dien Bien Phu, we put out of action 16,200 enemy troops, including the whole command of the entrenched camp, one g...\u003c/b\u003e\u003cbr\u003ekind: chunk\u003cbr\u003econtent_type: text\u003cbr\u003esection: Third phase: Annihilation of the enemy\u003cbr\u003etext: At Dien Bien Phu, we put out of action 16,200 enemy troops, including the whole command of the entrenched camp, one general, 16 colonels, 1,749 officers and non-commissioned officers, brought down or destroyed on the ground 62 planes of all types, seized all the enemy\u0027s armaments, ammunition equipment, and more than 30,000 parachutes.\n\nThose great victories of the Vietnam People\u0027s Army and people at Dien Bien Phu and on the other fronts smashed to pieces the \"Navarre plan\", and foiled the attemp"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::0::vo_nguyen_giap", "label": "Vo Nguyen Giap", "shape": "dot", "title": "\u003cb\u003eVo Nguyen Giap\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::1::dien_bien_phu", "label": "Dien Bien Phu", "shape": "dot", "title": "\u003cb\u003eDien Bien Phu\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::2::lai_chau", "label": "Lai Chau", "shape": "dot", "title": "\u003cb\u003eLai Chau\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::3::tuan_giao", "label": "Tuan Giao", "shape": "dot", "title": "\u003cb\u003eTuan Giao\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::4::son_la", "label": "supply lines", "shape": "dot", "title": "\u003cb\u003esupply lines\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign\u003cbr\u003ealiases: Son La"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::5::na_san", "label": "Na San", "shape": "dot", "title": "\u003cb\u003eNa San\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::6::luang_prabang", "label": "Luang Prabang", "shape": "dot", "title": "\u003cb\u003eLuang Prabang\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Historic Dien Bien Phu Campaign"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "200401-marxist-Dien-Bien-Phu::concept::7::sam_neua", "label": "Sam Neua", "shape": "dot", "title": "\u003cb\u003eSam Neua\u003c/b\u003e\u003cbr\u003ekind: concept\u003cbr\u003econtent_type: text\u003cbr\u003esection: The Hi             "gravitationalConstant": -80000,
            "springConstant": 0.001,
            "springLength": 250
        },
        "enabled": true,
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  
                      network.on("stabilizationProgress", function(params) {
                          document.getElementById('loadingBar').removeAttribute("style");
                          var maxWidth = 496;
                          var minWidth = 20;
                          var widthFactor = params.iterations/params.total;
                          var width = Math.max(minWidth,maxWidth * widthFactor);
                          document.getElementById('bar').style.width = width + 'px';
                          document.getElementById('text').innerHTML = Math.round(widthFactor*100) + '%';
                      });
                      network.once("stabilizationIterationsDone", function() {
                          document.getElementById('text').innerHTML = '100%';
                          document.getElementById('bar').style.width = '496px';
                          document.getElementById('loadingBar').style.opacity = 0;
                          // really clean the dom element
                          setTimeout(function () {document.getElementById('loadingBar').style.display = 'none';}, 500);
                      });
                  

                  return network;

              }
              drawGraph();
        </script>
    </body>
</html>
