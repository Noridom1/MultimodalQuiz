              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::0::chapter_8", "label": "Chapter 8", "shape": "dot", "title": "\u003cb\u003eChapter 8\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::1::scheduling", "label": "Scheduling", "shape": "dot", "title": "\u003cb\u003eScheduling\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::2::any_operating_system_is_likely_to_run_with_more_", "label": "Any operating system is likely to run with more processes than the computer has CPUs, so a plan is needed to time-share\u2026", "shape": "dot", "title": "\u003cb\u003eAny operating system is likely to run with more processes than the computer has CPUs, so a plan is needed to time-share\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: Scheduling\u003cbr\u003etext: Any operating system is likely to run with more processes than the computer has CPUs, so a plan is needed to time-share the CPUs among the processes. Ideally the sharing would be transparent to user processes. A common approach is to provide each process with the illusion that it has its own virtual CPU by multiplexing the processes onto the hardware CPUs. This chapter explains how xv6 achieves this multiplexing."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::3::before_proceeding_with_this_chapter_please_read_", "label": "Before proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule() in\u2026", "shape": "dot", "title": "\u003cb\u003eBefore proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule() in\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: Scheduling\u003cbr\u003etext: Before proceeding with this chapter, please read kernel/proc.h, kernel/swtch.S, and yield(), sched(), and schedule() in kernel/proc.c."}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::4::8_1_multiplexing", "label": "8.1 Multiplexing", "shape": "dot", "title": "\u003cb\u003e8.1 Multiplexing\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::5::xv6_multiplexes_by_switching_each_cpu_from_one_p", "label": "Xv6 multiplexes by switching each CPU from one process to another in two situations. First, xv6 switches when a process\u2026", "shape": "dot", "title": "\u003cb\u003eXv6 multiplexes by switching each CPU from one process to another in two situations. First, xv6 switches when a process\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.1 Multiplexing\u003cbr\u003etext: Xv6 multiplexes by switching each CPU from one process to another in two situations. First, xv6 switches when a process makes a system call that blocks (has to wait), for example read or wait. Second, xv6 periodically forces a switch to cope with processes that compute for long periods without blocking. The former are called voluntary switches, the latter involuntary."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::6::implementing_multiplexing_poses_a_few_challenges", "label": "Implementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is t\u2026", "shape": "dot", "title": "\u003cb\u003eImplementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is t\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.1 Multiplexing\u003cbr\u003etext: Implementing multiplexing poses a few challenges. First, how to switch from one process to another? The basic idea is to save and restore CPU registers, though the fact that this cannot be expressed in C makes it tricky. Second, how to force switches in a way that is transparent to user processes? Xv6 uses the standard technique in which a hardware timer\u2019s interrupts drive context switches. Third, all of the CPUs switch among the same set of processes, so a locking plan is necessary to avoid mis"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::7::8_2_context_switch_overview", "label": "8.2 Context switch overview", "shape": "dot", "title": "\u003cb\u003e8.2 Context switch overview\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::8::the_term_context_switch_refers_to_the_steps_invo", "label": "The term \u201ccontext switch\u201d refers to the steps involved in a CPU leaving off execution of one kernel thread (usually for\u2026", "shape": "dot", "title": "\u003cb\u003eThe term \u201ccontext switch\u201d refers to the steps involved in a CPU leaving off execution of one kernel thread (usually for\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: The term \u201ccontext switch\u201d refers to the steps involved in a CPU leaving off execution of one kernel thread (usually for later resumption), and resuming execution of a different kernel thread; this switching is the heart of multiplexing. Xv6 does not directly context switch from one process\u2019s kernel thread to another process\u2019s kernel thread; instead, a kernel thread gives up the CPU by context-switching to that CPU\u2019s \u201cscheduler thread,\u201d and the scheduler thread picks a different process\u2019s kernel "}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::image::9::images_e44c1bc110689c9f6cbead21d36537eb5309a7b22", "label": "![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)\u003c/b\u003e\u003cbr\u003ekind: image\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: ![](images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg)\u003cbr\u003eimage: images/e44c1bc110689c9f6cbead21d36537eb5309a7b22b2cfcc7470c1b534e9eff89.jpg"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::10::details_summary_flowchart_summary_mermaid_graph_", "label": "\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"]\u2026", "shape": "dot", "title": "\u003cb\u003e\u003cdetails\u003e \u003csummary\u003eflowchart\u003c/summary\u003e ```mermaid graph TD A[\"user space\"] --\u003e B[\"shell\"] B --\u003e C[\"save kernel space\"]\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: \u003cdetails\u003e\n\u003csummary\u003eflowchart\u003c/summary\u003e\n\n```mermaid\ngraph TD\n    A[\"user space\"] --\u003e B[\"shell\"]\n    B --\u003e C[\"save kernel space\"]\n    C --\u003e D[\"kstack shell\"]\n    D --\u003e E[\"switch\"]\n    E --\u003e F[\"kstack scheduler\"]\n    F --\u003e G[\"switch\"]\n    G --\u003e H[\"kstack cat\"]\n    H --\u003e I[\"restore kernel space\"]\n    I --\u003e J[\"cat\"]\n```\n\u003c/details\u003e"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::11::figure_8_1_switching_from_one_user_process_to_an", "label": "Figure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one scheduler\u2026", "shape": "dot", "title": "\u003cb\u003eFigure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one scheduler\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: Figure 8.1: Switching from one user process to another. In this example, xv6 runs with one CPU (and thus one scheduler thread)."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::12::at_a_broader_scope_the_steps_involved_in_switchi", "label": "At a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a t\u2026", "shape": "dot", "title": "\u003cb\u003eAt a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a t\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.2 Context switch overview\u003cbr\u003etext: At a broader scope, the steps involved in switching from one user process to another are illustrated in Figure 8.1: a trap (system call or interrupt) from the old process\u2019s user space to its kernel thread, a context switch to the current CPU\u2019s scheduler thread, a context switch to a new process\u2019s kernel thread, and a trap return to the user-level process."}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::13::8_3_code_context_switching", "label": "8.3 Code: Context switching", "shape": "dot", "title": "\u003cb\u003e8.3 Code: Context switching\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::14::the_function_swtch_in_kernel_swtch_s_contains_th", "label": "The function swtch() in kernel/swtch.S contains the heart of thread context switching: it saves the switched-from threa\u2026", "shape": "dot", "title": "\u003cb\u003eThe function swtch() in kernel/swtch.S contains the heart of thread context switching: it saves the switched-from threa\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: The function swtch() in kernel/swtch.S contains the heart of thread context switching: it saves the switched-from thread\u2019s CPU registers, and restores the previously-saved registers of the switched-to thread. The basic reason this is sufficient is that a thread\u2019s state consist of data in memory (e.g. its stack) plus its CPU registers; thread memory need not saved and restored because different threads keep their data in different areas of RAM; but the CPU has only one set of registers so they mu"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::15::each_thread_s_struct_proc_includes_a_struct_cont", "label": "Each thread\u2019s struct proc includes a struct context that holds the thread\u2019s saved registers when it is not running. A C\u2026", "shape": "dot", "title": "\u003cb\u003eEach thread\u2019s struct proc includes a struct context that holds the thread\u2019s saved registers when it is not running. A C\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: Each thread\u2019s struct proc includes a struct context that holds the thread\u2019s saved registers when it is not running. A CPU\u2019s scheduler thread\u2019s struct context is in that CPU\u2019s struct cpu. When thread X wishes to switch to thread Y, thread X calls swtch(\u0026X\u2019s context, \u0026Y\u2019s context). swtch() saves the current CPU registers in X\u2019s context, then loads the content of Y\u2019s context into the CPU registers, then returns."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::16::here_s_an_abbreviated_copy_of_swtch", "label": "Here\u2019s an abbreviated copy of swtch:", "shape": "dot", "title": "\u003cb\u003eHere\u2019s an abbreviated copy of swtch:\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: Here\u2019s an abbreviated copy of swtch:"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::17::swtch", "label": "swtch:", "shape": "dot", "title": "\u003cb\u003eswtch:\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: swtch:"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::18::txt_sd_ra_0_a0_sd_sp_8_a0_sd_s0_16_a0", "label": "```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```", "shape": "dot", "title": "\u003cb\u003e```txt sd ra, 0 (a0) sd sp, 8 (a0) sd s0, 16 (a0) ... ```\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```txt\nsd ra, 0 (a0)\nsd sp, 8 (a0)\nsd s0, 16 (a0)\n... \n```"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::19::asm_sd_s11_104_a0_ld_ra_0_a1_ld_sp_8_a1_ld_s0_16", "label": "```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```", "shape": "dot", "title": "\u003cb\u003e```asm sd s11, 104(a0) ld ra, 0(a1) ld sp, 8(a1) ld s0, 16(a1) ... ld s11, 104(a1) ret ```\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: ```asm\nsd s11, 104(a0)\nld ra, 0(a1)\nld sp, 8(a1)\nld s0, 16(a1)\n...\nld s11, 104(a1)\nret \n```"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::20::a0_holds_the_first_function_argument_and_a1_the_", "label": "a0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers t\u2026", "shape": "dot", "title": "\u003cb\u003ea0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers t\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: a0 holds the first function argument, and a1 the second; in this case, the two struct context pointers. 16(a0) refers to an offset 16 bytes into the memory pointed to by a0; referring to the definition of struct context in kernel/proc.h (1951), this is the structure field called s0."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::21::where_does_swtch_s_ret_return_to_it_returns_to_t", "label": "Where does swtch\u2019s ret return to? It returns to the instruction that the ra register points to. In the example in which\u2026", "shape": "dot", "title": "\u003cb\u003eWhere does swtch\u2019s ret return to? It returns to the instruction that the ra register points to. In the example in which\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: Where does swtch\u2019s ret return to? It returns to the instruction that the ra register points to. In the example in which thread X calls swtch() to switch to Y, when ret executes, ra has just been loaded from Y\u2019s struct context. And the ra in Y\u2019s struct context was originally saved by Y\u2019s call to swtch when Y gave up the CPU in the past. So the ret returns to the instruction after the point at which Y called swtch(); that is, X\u2019s call to swtch() returns as if returning from Y\u2019s original call to sw"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::22::swtch_2902_saves_callee_saved_registers_ra_sp_s0", "label": "swtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling convention\u2026", "shape": "dot", "title": "\u003cb\u003eswtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling convention\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.3 Code: Context switching\u003cbr\u003etext: swtch (2902) saves callee-saved registers (ra,sp,s0..s11) but not caller-saved registers. The RISC-V calling convention requires that if code needs to preserve the value in a caller-saved register across a function call, the compiler must generate instructions that save the register to the stack before the function call, and restore from the stack when the function returns. So swtch can rely on the function that called it having already saved the caller-saved registers (either that, or the calli"}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::23::8_4_code_scheduling", "label": "8.4 Code: Scheduling", "shape": "dot", "title": "\u003cb\u003e8.4 Code: Scheduling\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::24::the_last_section_looked_at_the_internals_of_swtc", "label": "The last section looked at the internals of swtch; now let\u2019s take swtch as a given and examine switching from one proce\u2026", "shape": "dot", "title": "\u003cb\u003eThe last section looked at the internals of swtch; now let\u2019s take swtch as a given and examine switching from one proce\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: The last section looked at the internals of swtch; now let\u2019s take swtch as a given and examine switching from one process\u2019s kernel thread through the scheduler to another process. The scheduler exists in the form of a special thread per CPU, each running the scheduler function. This function is in charge of choosing which process to run next. Each CPU has its own scheduler thread because more than one CPU may be looking for something to run at any given time. Process switching always goes throug"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::25::a_process_that_wants_to_give_up_the_cpu_must_acq", "label": "A process that wants to give up the CPU must acquire its own process lock p-\u003elock, release any other locks it is holdin\u2026", "shape": "dot", "title": "\u003cb\u003eA process that wants to give up the CPU must acquire its own process lock p-\u003elock, release any other locks it is holdin\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: A process that wants to give up the CPU must acquire its own process lock p-\u003elock, release any other locks it is holding, update its own state (p-\u003estate), and then call sched. You can see this sequence in yield (2629), sleep and kexit. sched calls swtch to save the current context in p-\u003econtext and switch to the scheduler context in cpu-\u003econtext. swtch returns on the scheduler\u2019s stack as though scheduler\u2019s swtch had returned (2582)."}, {"color": "#E45756", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::image::26::images_beedb7345045080a4a25965466805e3357535b86e", "label": "![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)", "shape": "dot", "title": "\u003cb\u003e![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)\u003c/b\u003e\u003cbr\u003ekind: image\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: ![](images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg)\u003cbr\u003eimage: images/beedb7345045080a4a25965466805e3357535b86ec85995631ca603dd06af753.jpg"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::27::details_summary_text_image_summary_process_1_acq", "label": "\u003cdetails\u003e \u003csummary\u003etext_image\u003c/summary\u003e Process 1 acquire(\u0026p-\u003elock); ... p-\u003estate = RUNNABLE; swtch(\u0026p-\u003econtext, ...);\u2026", "shape": "dot", "title": "\u003cb\u003e\u003cdetails\u003e \u003csummary\u003etext_image\u003c/summary\u003e Process 1 acquire(\u0026p-\u003elock); ... p-\u003estate = RUNNABLE; swtch(\u0026p-\u003econtext, ...);\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: \u003cdetails\u003e\n\u003csummary\u003etext_image\u003c/summary\u003e\n\nProcess 1\nacquire(\u0026p-\u003elock);\n...\np-\u003estate = RUNNABLE;\nswtch(\u0026p-\u003econtext, ...);\n\n    swtch(...); // return\n    release(\u0026p-\u003elock);\n\n        // find a RUNNABLE p\n\n    acquire(\u0026p-\u003elock);\n    p-\u003estate = RUNNING;\n    swtch(...,\u0026p-\u003econtext);\n\n            swtch(\u0026p-\u003econtext,...); // return\n    release(\u0026p-\u003elock);\n\u003c/details\u003e"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::28::figure_8_2_swtch_always_has_the_scheduler_thread", "label": "Figure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is always\u2026", "shape": "dot", "title": "\u003cb\u003eFigure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is always\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: Figure 8.2: swtch() always has the scheduler thread as either source or destination, and the relevant p-\u003elock is always held."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::29::scheduler_2558_runs_a_loop_find_a_process_to_run", "label": "scheduler (2558) runs a loop: find a process to run, swtch() to it, eventually it will swtch() back to the scheduler, w\u2026", "shape": "dot", "title": "\u003cb\u003escheduler (2558) runs a loop: find a process to run, swtch() to it, eventually it will swtch() back to the scheduler, w\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: scheduler (2558) runs a loop: find a process to run, swtch() to it, eventually it will swtch() back to the scheduler, which continues its loop. The scheduler loops over the process table looking for a runnable process, one that has $\\mathrm { p { - } { \u003e } s t a t e ~ } = \\mathrm { - } \\mathrm { \\sf ~ R U N N A B L E }$ . Once it finds a process, it sets the per-CPU current process variable c-\u003eproc, marks the process as RUNNING, and then calls swtch to start running it (2577-2582). At some point"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::30::xv6_holds_p_lock_across_calls_to_swtch_the_calle", "label": "xv6 holds p-\u003elock across calls to swtch: the caller of swtch acquires the lock, but it\u2019s released in the target after s\u2026", "shape": "dot", "title": "\u003cb\u003exv6 holds p-\u003elock across calls to swtch: the caller of swtch acquires the lock, but it\u2019s released in the target after s\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: xv6 holds p-\u003elock across calls to swtch: the caller of swtch acquires the lock, but it\u2019s released in the target after swtch returns. This arrangement is unusual: it\u2019s more common for the thread that acquires a lock to also release it. Xv6\u2019s context switching breaks this convention because p-\u003estate and p-\u003econtext must be updated together atomically. For example, if p-\u003elock were released before invoking swtch, a different CPU c might decide to run the process because its state is RUNNABLE. CPU c w"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::31::running_the_lock_cannot_be_released_until_the_pr", "label": "RUNNING, the lock cannot be released until the process\u2019s kernel thread is completely running (after the swtch, for exam\u2026", "shape": "dot", "title": "\u003cb\u003eRUNNING, the lock cannot be released until the process\u2019s kernel thread is completely running (after the swtch, for exam\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: RUNNING, the lock cannot be released until the process\u2019s kernel thread is completely running (after the swtch, for example in yield)."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::32::there_is_one_case_when_the_scheduler_s_call_to_s", "label": "There is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register o\u2026", "shape": "dot", "title": "\u003cb\u003eThere is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register o\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.4 Code: Scheduling\u003cbr\u003etext: There is one case when the scheduler\u2019s call to swtch does not end up in sched. allocproc sets the context ra register of a new process to forkret (2653), so that its first swtch \u201creturns\u201d to the start of that function. forkret exists to release the p-\u003elock and set up some control registers and trapframe fields that are required in order to return to user space. At the end, forkret simulates the normal return path from a system call back to user space."}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::33::8_5_code_mycpu_and_myproc", "label": "8.5 Code: mycpu and myproc", "shape": "dot", "title": "\u003cb\u003e8.5 Code: mycpu and myproc\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::34::xv6_often_needs_a_pointer_to_the_current_process", "label": "Xv6 often needs a pointer to the current process\u2019s proc structure. On a uniprocessor one could have a global variable p\u2026", "shape": "dot", "title": "\u003cb\u003eXv6 often needs a pointer to the current process\u2019s proc structure. On a uniprocessor one could have a global variable p\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: Xv6 often needs a pointer to the current process\u2019s proc structure. On a uniprocessor one could have a global variable pointing to the current proc. This doesn\u2019t work on a multi-core machine, since each CPU executes a different process. The way to solve this problem is to exploit the fact that each CPU has its own set of registers."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::35::while_a_given_cpu_is_executing_in_the_kernel_xv6", "label": "While a given CPU is executing in the kernel, xv6 ensures that the CPU\u2019s tp register always holds the CPU\u2019s hartid. RIS\u2026", "shape": "dot", "title": "\u003cb\u003eWhile a given CPU is executing in the kernel, xv6 ensures that the CPU\u2019s tp register always holds the CPU\u2019s hartid. RIS\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: While a given CPU is executing in the kernel, xv6 ensures that the CPU\u2019s tp register always holds the CPU\u2019s hartid. RISC-V numbers its CPUs, giving each a unique hartid. mycpu (2178) uses tp to index an array of cpu structures and return the one for the current CPU. A struct cpu (1971) holds a pointer to the proc structure of the process currently running on that CPU (if any), saved registers for the CPU\u2019s scheduler thread, and the count of nested spinlocks needed to manage interrupt disabling."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::36::ensuring_that_a_cpu_s_tp_holds_the_cpu_s_hartid_", "label": "Ensuring that a CPU\u2019s tp holds the CPU\u2019s hartid is a little involved, since user code is free to modify tp. start sets\u2026", "shape": "dot", "title": "\u003cb\u003eEnsuring that a CPU\u2019s tp holds the CPU\u2019s hartid is a little involved, since user code is free to modify tp. start sets\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: Ensuring that a CPU\u2019s tp holds the CPU\u2019s hartid is a little involved, since user code is free to modify tp. start sets the tp register early in the CPU\u2019s boot sequence, while still in machine mode (1094). While preparing to return to user space, prepare\\_return saves tp in the trampoline page, in case user code modifies it. Finally, uservec restores that saved tp when entering the kernel from user space (3127). The compiler guarantees never to modify tp in kernel code. It would be more convenien"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::37::the_return_values_of_cpuid_and_mycpu_are_fragile", "label": "The return values of cpuid and mycpu are fragile: if the timer were to interrupt and cause the thread to yield and late\u2026", "shape": "dot", "title": "\u003cb\u003eThe return values of cpuid and mycpu are fragile: if the timer were to interrupt and cause the thread to yield and late\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: The return values of cpuid and mycpu are fragile: if the timer were to interrupt and cause the thread to yield and later resume execution on a different CPU, a previously returned value would no longer be correct. To avoid this problem, xv6 requires code to disable interrupts before calling cpuid() or mycpu(), and only enable interrupts when done using the returned value."}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::38::the_function_myproc_2187_returns_the_struct_proc", "label": "The function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc d\u2026", "shape": "dot", "title": "\u003cb\u003eThe function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc d\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.5 Code: mycpu and myproc\u003cbr\u003etext: The function myproc (2187) returns the struct proc pointer for the process that is running on the current CPU. myproc disables interrupts, invokes mycpu, fetches the current process pointer (c-\u003eproc) out of the struct cpu, and then enables interrupts. The return value of myproc is safe to use even if interrupts are enabled: if a timer interrupt moves the calling process to a different CPU, its struct proc pointer will stay the same."}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::39::8_6_real_world", "label": "8.6 Real world", "shape": "dot", "title": "\u003cb\u003e8.6 Real world\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::40::the_xv6_scheduler_implements_a_simple_scheduling", "label": "The xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round rob\u2026", "shape": "dot", "title": "\u003cb\u003eThe xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round rob\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.6 Real world\u003cbr\u003etext: The xv6 scheduler implements a simple scheduling policy that runs each process in turn. This policy is called round robin. Real operating systems implement more sophisticated policies that, for example, allow processes to have priorities. The idea is that a runnable high-priority process will be preferred by the scheduler over a runnable low-priority process. These policies can become complex because there are often competing goals: for example, the operating system might also want to guarantee "}, {"color": "#4C78A8", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::section::41::8_7_exercises", "label": "8.7 Exercises", "shape": "dot", "title": "\u003cb\u003e8.7 Exercises\u003c/b\u003e\u003cbr\u003ekind: section"}, {"color": "#72B7B2", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::block::42::modify_xv6_to_use_only_one_context_switch_when_s", "label": "Modify xv6 to use only one context switch when switching from one process\u2019s kernel thread to another, rather than switc\u2026", "shape": "dot", "title": "\u003cb\u003eModify xv6 to use only one context switch when switching from one process\u2019s kernel thread to another, rather than switc\u2026\u003c/b\u003e\u003cbr\u003ekind: block\u003cbr\u003esection: 8.7 Exercises\u003cbr\u003etext: Modify xv6 to use only one context switch when switching from one process\u2019s kernel thread to another, rather than switching through the scheduler thread. The yielding thread will need to select the next thread itself and call swtch. The challenges will be to prevent multiple CPUs from executing the same thread accidentally; to get the locking right; and to avoid deadlocks."}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::0::operating_system", "label": "operating system", "shape": "dot", "title": "\u003cb\u003eoperating system\u003c/b\u003e\u003cbr\u003ekind: concept"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::1::processes", "label": "processes", "shape": "dot", "title": "\u003cb\u003eprocesses\u003c/b\u003e\u003cbr\u003ekind: concept"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::2::cpus", "label": "cpus", "shape": "dot", "title": "\u003cb\u003ecpus\u003c/b\u003e\u003cbr\u003ekind: concept"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::3::time_share", "label": "time-share", "shape": "dot", "title": "\u003cb\u003etime-share\u003c/b\u003e\u003cbr\u003ekind: concept"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::4::virtual_cpu", "label": "virtual cpu", "shape": "dot", "title": "\u003cb\u003evirtual cpu\u003c/b\u003e\u003cbr\u003ekind: concept"}, {"color": "#F58518", "font": {"color": "#111111"}, "id": "book-riscv-rev5-chap8::concept::5::multiplexing", "label": "multiplexing", "shape": "dot", "title": "\u003cb\u003emultiplexing\u003c/b\u
